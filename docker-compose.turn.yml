services:
  turn:
    image: coturn/coturn:4.6
    container_name: blockshift-turn
    restart: unless-stopped
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "49160-49200:49160-49200/udp"
    command:
      - "-n"
      - "--log-file=stdout"
      - "--fingerprint"
      - "--lt-cred-mech"
      - "--realm=${TURN_REALM:-blockshiftarena.local}"
      - "--user=${TURN_USERNAME:?set TURN_USERNAME}:${TURN_CREDENTIAL:?set TURN_CREDENTIAL}"
      - "--min-port=49160"
      - "--max-port=49200"
      - "--no-cli"
